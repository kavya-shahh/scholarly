server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: scholarly-backend

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/scholarly}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25

  security:
    # Disable default autogenerated user password in console for testing
    user:
      name: user
      password: password

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

security:
  jwt:
    # Symmetric encryption key (at least 256 bits for HMAC-SHA256)
    secret: ${JWT_SECRET:9a4f2c8d3b7a1e5f8g9h0j1k2l3m4n5o6p7q8r9s0t1u2v3w4x5y6z7a8b9c0d1e2f3g4h5}
    expiration-ms: 86400000 # 24 hours

